<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BEKCAN CMA (Conference Management App)</title>
  
  <!-- PWA Settings -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BEKCAN CMA">
  <link rel="apple-touch-icon" href="https://bekcan.com/uploads/default/original/1X/d463e22bb7c3c345f7b1c32c8a12a473a500ff7d.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="/styles.css">
  
  <style>
    /* Custom Styles for Landing Page */
    .hero-banner {
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      border-radius: 16px;
      padding: 24px;
      color: #ffffff;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15);
    }
    .hero-banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 80%);
      pointer-events: none;
    }
    .hero-title {
      font-size: 1.8rem;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .hero-subtitle {
      font-size: 0.88rem;
      opacity: 0.9;
      font-weight: 500;
      line-height: 1.4;
    }
    .conf-list-title {
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--text-subtle);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .conf-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .conf-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      text-decoration: none;
    }
    .conf-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.05);
      border-color: #cbd5e1;
    }
    .conf-card:active {
      transform: scale(0.98);
    }
    .conf-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
      padding-right: 28px;
    }
    .conf-meta-row {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .conf-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .conf-meta-icon {
      width: 14px;
      height: 14px;
      stroke: var(--text-subtle);
    }
    .conf-enter-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-subtle);
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .conf-card:hover .conf-enter-arrow {
      color: var(--accent-primary);
      transform: translateY(-50%) translateX(2px);
    }
    .landing-footer {
      margin-top: auto;
      padding: 24px 0 12px 0;
      text-align: center;
      border-top: 1px solid var(--border-color);
    }
    .landing-footer img {
      max-width: 110px;
      height: auto;
      margin-bottom: 10px;
      opacity: 0.8;
      transition: opacity var(--transition-fast);
    }
    .landing-footer img:hover {
      opacity: 1;
    }
    .landing-footer p {
      font-size: 0.72rem;
      color: var(--text-subtle);
    }
    .landing-footer a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- App Container -->
  <div id="app" class="app-container">
    
    <!-- Top Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="brand">
          <img src="/icon.png" class="header-logo" alt="BEKCAN Logo">
          <div class="brand-text">
            <span class="conf-year">BEKCAN CMA</span>
            <span class="conf-subtitle" data-tr="Konferans Yönetim Uygulaması" data-en="Conference Management App">Konferans Yönetim Uygulaması</span>
          </div>
        </div>
        <button id="lang-toggle" class="lang-btn" aria-label="Switch Language">
          <span class="lang-flag">🇬🇧</span> <span class="lang-text">EN</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      
      <!-- Hero Section -->
      <section class="hero-banner">
        <h1 class="hero-title">BEKCAN CMA</h1>
        <p class="hero-subtitle" data-tr="BEKCAN Enstitüsü Konferans Portalı'na hoş geldiniz. Katılmak istediğiniz konferansı aşağıdan seçebilirsiniz." data-en="Welcome to BEKCAN Institute Conference Portal. Please select the conference you want to view from below.">BEKCAN Enstitüsü Konferans Portalı'na hoş geldiniz. Katılmak istediğiniz konferansı aşağıdan seçebilirsiniz.</p>
      </section>

      <!-- Conference List Section -->
      <section>
        <h2 class="conf-list-title" data-tr="Konferans Takvimi" data-en="Conference Calendar">Konferans Takvimi</h2>
        
        <div id="conferences-list" class="conf-grid">
          <!-- Skeletons loaded initially -->
          <div class="skeleton-loader" style="height: 90px; border-radius: 14px;"></div>
          <div class="skeleton-loader" style="height: 90px; border-radius: 14px;"></div>
        </div>
      </section>

      <!-- Footer Branding -->
      <footer class="landing-footer">
        <a href="https://bekcan.com" target="_blank" rel="noopener">
          <img src="https://bekcan.com/uploads/default/original/1X/1f3d95a1cd5631102b54de886e356461fa462142.png" alt="BEKCAN Logo">
        </a>
        <p>© 2026 BEKCAN CMA • <span data-tr="Tüm Hakları Saklıdır." data-en="All Rights Reserved.">Tüm Hakları Saklıdır.</span></p>
        <p style="margin-top: 4px;"><a href="https://bekcan.com" target="_blank" rel="noopener">bekcan.com</a></p>
      </footer>

    </main>

  </div>

  <!-- Landing JavaScript -->
  <script src="/landing.js"></script>
</body>
</html>
